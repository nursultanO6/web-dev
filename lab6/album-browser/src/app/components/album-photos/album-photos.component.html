<div class="photos-page">
  <button class="btn-back" (click)="goBack()">← Back to Album #{{ albumId }}</button>

  <!-- Loading -->
  <div class="loading-state" *ngIf="loading">
    <div class="spinner"></div>
    <p>Loading photos...</p>
  </div>

  <!-- Error -->
  <div class="error-state" *ngIf="error">
    <span>⚠️</span> {{ error }}
  </div>

  <!-- Photos Grid -->
  <div *ngIf="!loading && !error">
    <div class="page-header">
      <h1>Photos — Album #{{ albumId }}</h1>
      <p class="subtitle">{{ photos.length }} photos</p>
    </div>

    <div class="photo-grid" *ngIf="photos.length > 0">
      <div class="photo-card" *ngFor="let photo of photos">
        <div class="photo-img-wrapper">
          <img
            [src]="photo.thumbnailUrl"
            [alt]="photo.title"
            loading="lazy"
            (error)="onImgError($event, photo.id)"
          />
        </div>
        <p class="photo-title">{{ photo.title }}</p>
      </div>
    </div>

    <div class="empty-state" *ngIf="photos.length === 0">
      <p>No photos found for this album.</p>
    </div>
  </div>
</div>
